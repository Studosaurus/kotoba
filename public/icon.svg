<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Kotoba pixel tanuki">
  <rect width="512" height="512" fill="#050607" />

  <!-- Big curled tail behind the body. All shapes stay on a 16px grid for a pixel-art read. -->
  <rect x="304" y="160" width="48" height="48" fill="#8b5a34" />
  <rect x="352" y="144" width="64" height="48" fill="#8b5a34" />
  <rect x="400" y="176" width="48" height="80" fill="#8b5a34" />
  <rect x="384" y="256" width="48" height="64" fill="#8b5a34" />
  <rect x="336" y="304" width="64" height="48" fill="#8b5a34" />
  <rect x="304" y="288" width="48" height="48" fill="#c18452" />
  <rect x="368" y="176" width="32" height="32" fill="#c18452" />
  <rect x="416" y="208" width="16" height="32" fill="#c18452" />
  <rect x="416" y="176" width="16" height="16" fill="#f2cf9b" />

  <!-- Ears -->
  <rect x="128" y="112" width="48" height="48" fill="#6b4429" />
  <rect x="336" y="112" width="48" height="48" fill="#6b4429" />
  <rect x="144" y="128" width="16" height="16" fill="#f2cf9b" />
  <rect x="352" y="128" width="16" height="16" fill="#f2cf9b" />

  <!-- Head -->
  <rect x="160" y="128" width="192" height="48" fill="#a86f42" />
  <rect x="128" y="176" width="256" height="96" fill="#a86f42" />
  <rect x="144" y="192" width="224" height="80" fill="#d49a61" />
  <rect x="176" y="224" width="160" height="80" fill="#f2cf9b" />

  <!-- Mask and eyes -->
  <rect x="144" y="192" width="80" height="64" fill="#4a2f22" />
  <rect x="288" y="192" width="80" height="64" fill="#4a2f22" />
  <rect x="184" y="208" width="24" height="24" fill="#050607" />
  <rect x="304" y="208" width="24" height="24" fill="#050607" />
  <rect x="192" y="208" width="8" height="8" fill="#ffffff" />
  <rect x="312" y="208" width="8" height="8" fill="#ffffff" />

  <!-- Snout -->
  <rect x="224" y="256" width="64" height="32" fill="#f8e7c3" />
  <rect x="240" y="256" width="32" height="16" fill="#4a2f22" />
  <rect x="248" y="288" width="16" height="16" fill="#4a2f22" />
  <rect x="224" y="304" width="64" height="8" fill="#4a2f22" />

  <!-- Body -->
  <rect x="176" y="304" width="160" height="112" fill="#a86f42" />
  <rect x="192" y="320" width="128" height="80" fill="#f2cf9b" />
  <rect x="160" y="320" width="32" height="64" fill="#6b4429" />
  <rect x="320" y="320" width="32" height="64" fill="#6b4429" />

  <!-- Feet -->
  <rect x="176" y="416" width="64" height="32" fill="#6b4429" />
  <rect x="272" y="416" width="64" height="32" fill="#6b4429" />
  <rect x="192" y="432" width="32" height="8" fill="#f2cf9b" />
  <rect x="288" y="432" width="32" height="8" fill="#f2cf9b" />

  <!-- Pixel sparkle/accent -->
  <rect x="96" y="96" width="16" height="16" fill="#a8c7fa" />
  <rect x="112" y="80" width="16" height="16" fill="#a8c7fa" />
  <rect x="400" y="368" width="16" height="16" fill="#a8c7fa" />
</svg>
